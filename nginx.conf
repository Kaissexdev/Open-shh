worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Route based on the Upgrade header:
    #   "websocket" → SSH tunnel (ws_proxy on port 8080)
    #   anything else → health check (ws_proxy health endpoint on port 8081)
    map $http_upgrade $backend {
        default    "127.0.0.1:8081";
        "websocket" "127.0.0.1:8080";
    }

    server {
        listen 443 ssl;
        server_name applynow.hdfc.bank.in;

        ssl_certificate     /etc/tls/fullchain.pem;
        ssl_certificate_key /etc/tls/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
